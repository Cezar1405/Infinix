<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Player Universal</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
}

/* quitar cualquier espacio fantasma */
* {
    box-sizing: border-box;
}

.player {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    border: none;
    margin: 0;
    padding: 0;
    display: block;
}
</style>
</head>

<body>

<script>
window.onload = () => {
    const params = new URLSearchParams(window.location.search);

    let videoUrl = null;

    if (params.has('url')) {
        videoUrl = params.get('url');
    }
    else if (params.has('v')) {
        videoUrl = atob(params.get('v'));
    }

    if (!videoUrl) {
        document.body.innerHTML = "<h2 style='color:white'>No URL</h2>";
        return;
    }

    const iframe = document.createElement("iframe");
    iframe.className = "player";
    iframe.src = videoUrl;
    iframe.allowFullscreen = true;
    iframe.setAttribute("frameborder", "0");

    document.body.appendChild(iframe);
};
</script>

</body>
</html>

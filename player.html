<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>INFINIX Player</title>

<style>
@font-face{
font-family:"MiFuente";
src:url("fonts/Exo2-RegularCondensed.otf") format("opentype");
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
font-family:"MiFuente",sans-serif;
overflow:hidden;
}

/* PLAYER */
.player-wrap{
position:fixed;
inset:0;
background:#000;
}

.player-wrap iframe{
width:100%;
height:100%;
border:none;
}

/* BOTON */
.toggle-btn{
position:fixed;
right:0;
top:50%;
transform:translateY(-50%);
z-index:999;
width:42px;
height:54px;
border:none;
cursor:pointer;
border-radius:14px 0 0 14px;
background:linear-gradient(180deg,#e50914,#7a0000);
color:#fff;
font-size:20px;
font-weight:bold;
transition:.35s ease;
box-shadow:0 0 20px rgba(229,9,20,.35);
}

/* PANEL */
.side-panel{
position:fixed;
top:0;
right:-380px;
width:380px;
height:100%;
background:linear-gradient(180deg,#111,#000);
z-index:998;
transition:.35s ease;
overflow-y:auto;
border-left:1px solid rgba(255,255,255,.08);
box-shadow:-10px 0 30px rgba(0,0,0,.45);
}

.side-panel.active{
right:0;
}

.side-panel.active + .toggle-btn{
right:380px;
}

/* HEADER */
.panel-header{
padding:18px;
font-size:20px;
font-weight:800;
color:#fff;
border-bottom:1px solid rgba(255,255,255,.08);
}

/* CONTENT */
.panel-content{
padding:16px;
}

/* INFO */
.movie-box{
display:flex;
gap:14px;
align-items:flex-start;
margin-bottom:18px;
border:1px solid gray;
padding:5px;
border-radius:5px;
}

.poster{
width:115px;
min-width:115px;
border-radius:14px;
object-fit:cover;
}

.movie-info{
flex:1;
min-width:0;
}

.title{
font-size:22px;
font-weight:800;
line-height:1.15;
margin-bottom:8px;
color:#fff;
}

.meta{
font-size:13px;
color:#999;
margin-bottom:10px;
}

.desc{
font-size:13px;
line-height:1.45;
color:#ddd;
display:-webkit-box;
-webkit-line-clamp:5;
-webkit-box-orient:vertical;
overflow:hidden;
text-overflow:ellipsis;
}

/* SERVER */
.server-title{
display:block;
font-size:13px;
color:#aaa;
margin-bottom:8px;
letter-spacing:1px;
}

.server-select, .server-select2{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#1f1f1f;
color:#fff;
font-size:14px;
outline:none;
cursor:pointer;
}

/* MOBILE */
@media(max-width:700px){

.side-panel{
width:88%;
right:-88%;
}

.side-panel.active + .toggle-btn{
right:88%;
}

.movie-box{
gap:12px;
}

.poster{
width:95px;
min-width:95px;
}

.title{
font-size:18px;
}

}
</style>
</head>

<body>

<!-- PLAYER -->
<div class="player-wrap">
<iframe id="frame" allowfullscreen></iframe>
</div>

<!-- PANEL -->
<div class="side-panel" id="panel">

<div class="panel-header">
• INFINIX PLAYERS
</div>

<div class="panel-content">

<div class="movie-box">

<img class="poster" id="poster">

<div class="movie-info">

<div class="title" id="title">Cargando...</div>

<div class="meta" id="meta"></div>

<div class="desc" id="desc"></div>

</div>
</div>

<label class="server-title">
SERVER SELECTION
</label>
<select id="serverSelect" class="server-select"></select>

</div>
</div>

<!-- BOTON -->
<button class="toggle-btn" onclick="togglePanel()" id="toggleBtn">
❮
</button>

<script>
const API_KEY = "e5b2682e7bb828b5672763493fd61333";

const panel = document.getElementById("panel");
const btn = document.getElementById("toggleBtn");
const frame = document.getElementById("frame");
const select = document.getElementById("serverSelect");

const allowedDomains = [
    "videasy.net",
    "vidfast.pro",
    "vidlink.pro",
    "vidrock.net",
    "vidsrc.wtf",
    "streamwish.to",
    "vidhidepro.com",
    "voe.sx",
    "doodstream.com",
    "waaw.to"
];

function isAllowed(url) {
    try {
        const u = new URL(url);
        return allowedDomains.some(domain => u.hostname.includes(domain));
    } catch (e) {
        return false;
    }
}

let lastSafeUrl = null;
let monitor = null;

function safeLoad(url) {

    if (!isAllowed(url)) {
        alert("Bloqueado dominio no permitido:\n" + url);
        return;
    }

    lastSafeUrl = url;
    frame.src = url;
}

/* TOAST SIMPLE */
function showToast(msg){

    const old = document.getElementById("toastMsg");
    if(old) old.remove();

    const div = document.createElement("div");
    div.id = "toastMsg";

    div.style.position = "fixed";
    div.style.bottom = "20px";
    div.style.left = "50%";
    div.style.transform = "translateX(-50%)";
    div.style.background = "linear-gradient(180deg,#e50914,#7a0000)";
    div.style.color = "#fff";
    div.style.padding = "12px 18px";
    div.style.borderRadius = "10px";
    div.style.fontSize = "14px";
    div.style.zIndex = "99999";
    div.style.boxShadow = "0 0 20px rgba(229,9,20,.35)";
    div.innerText = msg;

    document.body.appendChild(div);

    setTimeout(()=>{
        div.remove();
    },3000);
}

/* CONVERTIR TITULO */
function createCleanTitle(title){

    return title
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/[*"'`:;!?,.()[\]{}]/g, "")
    .replace(/\s+/g, "-")
    .replace(/-+/g, "-")
    .replace(/^-|-$/g, "");
}

/* BLOQUEAR POPUPS */
window.open = function () {
    return null;
};

/* BLOQUEAR LINKS _blank */
document.addEventListener("click", function (e) {

    const a = e.target.closest("a");
    if (!a) return;

    if (a.target === "_blank") {
        e.preventDefault();
    }

});

/* CONTROLAR IFRAME */
frame.addEventListener("load", () => {

    try {
        frame.contentWindow.open = function () {
            return null;
        };
    } catch (e) {}

    if (monitor) clearInterval(monitor);

    monitor = setInterval(() => {

        try {

            const current = frame.contentWindow.location.href;

            if (!isAllowed(current)) {
                frame.src = lastSafeUrl;
            }

        } catch (e) {}

    }, 1000);

});

function togglePanel(){

    panel.classList.toggle("active");

    btn.innerHTML =
    panel.classList.contains("active")
    ? "❯"
    : "❮";
}

/* SERVERS NORMALES */
const servers = [

{
name:"MAIN 1",
url:id => `https://player.videasy.net/movie/${id}?color=FF0000&overlay=true`
},

{
name:"MAIN 2",
url:id => `https://vidfast.pro/movie/${id}?autoPlay=true&title=true&poster=true&theme=FF0000`
},

{
name:"MAIN 3",
url:id => `https://vidlink.pro/movie/${id}?primaryColor=FF0000&secondaryColor=a2a2a2&iconColor=eefdec&icons=default&player=default&title=true&poster=true&autoplay=true&nextbutton=false`
},

{
name:"MAIN 4",
url:id => `https://vidrock.net/mega/movie/${id}`
},

{
name:"MAIN 5",
url:id => `https://www.vidsrc.wtf/api/1/movie/?color=FF0000&id=${id}`
}

];

/* CARGAR SERVERS */
function loadServers(id){

    select.innerHTML = "";

    servers.forEach((server,index)=>{

        const option = document.createElement("option");

        option.value = server.url(id);
        option.textContent = server.name;

        select.appendChild(option);

        if(index === 0){
            safeLoad(option.value);
        }

    });

}

select.addEventListener("change",function(){
    safeLoad(this.value);
});

/* LEER URL */
const params = new URLSearchParams(location.search);
const tmdbid = params.get("tmdbid");

/* SCRAPING */
async function scrapServersLat(pelisplusUrl){

    try{

        const res = await fetch(pelisplusUrl);

        if(!res.ok){
            showToast("No abrió la página");
            return [];
        }

        const html = await res.text();

        const parser = new DOMParser();
        const doc = parser.parseFromString(html, "text/html");

        const items = doc.querySelectorAll("li");

        const servers_lat = [];

        items.forEach(li => {

            const text = (li.innerText || "").toLowerCase();

            // filtrar idioma
            const isLatino =
                text.includes("lat") ||
                text.includes("español");

            const isSub =
                text.includes("subtitulado");

            if(!isLatino || isSub) return;

            const iframe = li.querySelector("iframe");
            if(!iframe) return;

            let src =
                iframe.getAttribute("src") ||
                iframe.getAttribute("data-src");

            if(!src) return;

            // normalizar URL
            src = src.replace(/&amp;/g, "&");

            if(src.startsWith("//")){
                src = "https:" + src;
            }

            if(src.includes("about:blank")) return;

            servers_lat.push({
                name: li.innerText.trim().split("\n")[0],
                url: src
            });

        });

        if(servers_lat.length === 0){
            showToast("No se encontraron servidores LAT");
        }else{
            showToast("Servidores LAT: " + servers_lat.length);
        }

        return servers_lat;

    }catch(err){

        console.log(err);
        showToast("Error scraping iframe");
        return [];

    }
}

/* CARGAR TMDB */
async function loadMovie(){

    if(!tmdbid) return;

    const url =
    `https://api.themoviedb.org/3/movie/${tmdbid}?api_key=${API_KEY}&language=es-MX`;

    const res = await fetch(url);
    const data = await res.json();

    const movieTitle = data.title || "Sin título";

    document.getElementById("title").textContent = movieTitle;

    const data_film = (data.release_date || "").slice(0,4);//año de la peli

    document.getElementById("meta").textContent =
    `${data_film} • ${data.runtime || 0} min • ⭐ ${data.vote_average?.toFixed(1) || "0"}`;

    document.getElementById("desc").textContent =
    data.overview || "Sin descripción.";

    document.getElementById("poster").src =
    data.poster_path
    ? `https://image.tmdb.org/t/p/w300${data.poster_path}`
    : "";

    const title_cv = createCleanTitle(movieTitle);

    const pelisplusUrl =
    "https://pelicinehd.com/movies/" + title_cv;

    alert("URL SCRAP:\n" + pelisplusUrl);

    const servers_lat =
    await scrapServersLat(pelisplusUrl);

    if(servers_lat.length > 0){

        select.innerHTML = "";

        servers_lat.forEach((server,index)=>{

            const option = document.createElement("option");

            option.value = server.url;
            option.textContent = server.name;

            select.appendChild(option);

            if(index === 0){
                safeLoad(server.url);
            }

        });

    }else{

        loadServers(tmdbid);

    }

}

loadMovie();
</script>

</body>
</html>

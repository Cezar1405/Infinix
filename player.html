<script>
const API_KEY = "e5b2682e7bb828b5672763493fd61333";

const panel = document.getElementById("panel");
const btn = document.getElementById("toggleBtn");
const frame = document.getElementById("frame");
const select = document.getElementById("serverSelect");

const allowedDomains = [
    "videasy.net",
    "vidfast.pro",
    "vidlink.pro",
    "vidrock.net",
    "vidsrc.wtf",
    "streamwish.to",
    "vidhidepro.com",
    "voe.sx",
    "doodstream.com",
    "waaw.to"
];

function isAllowed(url) {
    try {
        const u = new URL(url);
        return allowedDomains.some(domain => u.hostname.includes(domain));
    } catch (e) {
        return false;
    }
}

let lastSafeUrl = null;
let monitor = null;

function safeLoad(url) {

    if (!isAllowed(url)) {
        alert("Bloqueado dominio no permitido:\n" + url);
        return;
    }

    lastSafeUrl = url;
    frame.src = url;
}

/* TOAST SIMPLE */
function showToast(msg){

    const old = document.getElementById("toastMsg");
    if(old) old.remove();

    const div = document.createElement("div");
    div.id = "toastMsg";

    div.style.position = "fixed";
    div.style.bottom = "20px";
    div.style.left = "50%";
    div.style.transform = "translateX(-50%)";
    div.style.background = "linear-gradient(180deg,#e50914,#7a0000)";
    div.style.color = "#fff";
    div.style.padding = "12px 18px";
    div.style.borderRadius = "10px";
    div.style.fontSize = "14px";
    div.style.zIndex = "99999";
    div.style.boxShadow = "0 0 20px rgba(229,9,20,.35)";
    div.innerText = msg;

    document.body.appendChild(div);

    setTimeout(()=>{
        div.remove();
    },3000);
}

/* CONVERTIR TITULO */
function createCleanTitle(title){

    return title
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/[*"'`:;!?,.()[\]{}]/g, "")
    .replace(/\s+/g, "-")
    .replace(/-+/g, "-")
    .replace(/^-|-$/g, "");
}

/* BLOQUEAR POPUPS */
window.open = function () {
    return null;
};

/* BLOQUEAR LINKS _blank */
document.addEventListener("click", function (e) {

    const a = e.target.closest("a");
    if (!a) return;

    if (a.target === "_blank") {
        e.preventDefault();
    }

});

/* CONTROLAR IFRAME */
frame.addEventListener("load", () => {

    try {
        frame.contentWindow.open = function () {
            return null;
        };
    } catch (e) {}

    if (monitor) clearInterval(monitor);

    monitor = setInterval(() => {

        try {

            const current = frame.contentWindow.location.href;

            if (!isAllowed(current)) {
                frame.src = lastSafeUrl;
            }

        } catch (e) {}

    }, 1000);

});

function togglePanel(){

    panel.classList.toggle("active");

    btn.innerHTML =
    panel.classList.contains("active")
    ? "❯"
    : "❮";
}

/* SERVERS NORMALES */
const servers = [

{
name:"MAIN 1",
url:id => `https://player.videasy.net/movie/${id}?color=FF0000&overlay=true`
},

{
name:"MAIN 2",
url:id => `https://vidfast.pro/movie/${id}?autoPlay=true&title=true&poster=true&theme=FF0000`
},

{
name:"MAIN 3",
url:id => `https://vidlink.pro/movie/${id}?primaryColor=FF0000&secondaryColor=a2a2a2&iconColor=eefdec&icons=default&player=default&title=true&poster=true&autoplay=true&nextbutton=false`
},

{
name:"MAIN 4",
url:id => `https://vidrock.net/mega/movie/${id}`
},

{
name:"MAIN 5",
url:id => `https://www.vidsrc.wtf/api/1/movie/?color=FF0000&id=${id}`
}

];

/* CARGAR SERVERS */
function loadServers(id){

    select.innerHTML = "";

    servers.forEach((server,index)=>{

        const option = document.createElement("option");

        option.value = server.url(id);
        option.textContent = server.name;

        select.appendChild(option);

        if(index === 0){
            safeLoad(option.value);
        }

    });

}

select.addEventListener("change",function(){
    safeLoad(this.value);
});

/* LEER URL */
const params = new URLSearchParams(location.search);
const tmdbid = params.get("tmdbid");

/* SCRAPING */
async function scrapServersLat(pelisplusUrl){

    try{

        const res = await fetch(pelisplusUrl);

        if(!res.ok){
            showToast("No abrió PelisPlus");
            return [];
        }

        const html = await res.text();

        const parser = new DOMParser();
        const doc = parser.parseFromString(html, "text/html");

        const items = doc.querySelectorAll("li.playurl");

        const servers_lat = [];

        items.forEach(item => {

            const idioma =
            (item.dataset.name || "")
            .toLowerCase()
            .trim();

            if(
                idioma === "español" ||
                idioma === "español latino"
            ){

                const host = item.innerText.trim();
                const url = item.dataset.url;

                if(url){
                    servers_lat.push({
                        name: host,
                        url: url
                    });
                }

            }

        });

        if(servers_lat.length === 0){
            showToast("No se encontraron links LAT");
        }else{
            showToast("Links LAT encontrados: " + servers_lat.length);
        }

        return servers_lat;

    }catch(err){

        showToast("Falló scraping");
        return [];

    }

}

/* CARGAR TMDB */
async function loadMovie(){

    if(!tmdbid) return;

    const url =
    `https://api.themoviedb.org/3/movie/${tmdbid}?api_key=${API_KEY}&language=es-MX`;

    const res = await fetch(url);
    const data = await res.json();

    const movieTitle = data.title || "Sin título";

    document.getElementById("title").textContent = movieTitle;

    document.getElementById("meta").textContent =
    `${(data.release_date || "").slice(0,4)} • ${data.runtime || 0} min • ⭐ ${data.vote_average?.toFixed(1) || "0"}`;

    document.getElementById("desc").textContent =
    data.overview || "Sin descripción.";

    document.getElementById("poster").src =
    data.poster_path
    ? `https://image.tmdb.org/t/p/w300${data.poster_path}`
    : "";

    const title_cv = createCleanTitle(movieTitle);

    const pelisplusUrl =
    "https://www.pelisplushd.ms/pelicula/" + title_cv;

    /* ALERT PARA VERIFICAR URL */
    alert("URL SCRAP:\n" + pelisplusUrl);

    const servers_lat =
    await scrapServersLat(pelisplusUrl);

    if(servers_lat.length > 0){

        select.innerHTML = "";

        servers_lat.forEach((server,index)=>{

            const option = document.createElement("option");

            option.value = server.url;
            option.textContent = server.name;

            select.appendChild(option);

            if(index === 0){
                safeLoad(server.url);
            }

        });

    }else{

        loadServers(tmdbid);

    }

}

loadMovie();
</script>
